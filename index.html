<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stock Trend Visualizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen">

  <main class="p-6 max-w-3xl mx-auto">

    <h1 class="text-2xl font-bold mb-4">Stock Trend Visualizer</h1>

    <!-- Search Section -->
    <section class="flex gap-2">
      <input 
        id="searchInput"
        class="p-2 rounded text-black w-full"
        placeholder="Enter stock symbol (e.g. AAPL)"
      />
      <button 
        id="searchBtn"
        class="bg-blue-500 px-4 py-2 rounded hover:bg-blue-600">
        Search
      </button>
    </section>

    <!-- Results -->
    <section id="results" class="mt-6" aria-live="polite"></section>

    <!-- Chart -->
    <canvas id="chart" class="mt-6"></canvas>

    <!-- Saved Stocks -->
    <section class="mt-6">
      <h2 class="text-lg font-semibold">Saved Stocks</h2>
      <div id="saved" class="mt-2"></div>
    </section>

  </main>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- JS Files -->
  <script src="js/api.js"></script>
  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
